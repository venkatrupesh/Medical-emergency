<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Train Ticket - TrainCare Connect</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/unified_theme.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .booking-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .booking-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: var(--transition);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(13, 71, 161, 0.1);
        }
        .search-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .search-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .results-section {
            margin-top: 40px;
        }
        .train-result {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 24px;
            margin-bottom: 20px;
            transition: var(--transition);
        }
        .train-result:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--primary-color);
        }
        .train-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
        }
        .train-info h3 {
            margin: 0 0 8px;
            color: var(--primary-color);
        }
        .train-info p {
            margin: 4px 0;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .train-timing {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            margin: 20px 0;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
        }
        .timing-item {
            text-align: center;
        }
        .timing-item .time {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .timing-item .station {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .duration {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .book-btn {
            padding: 12px 24px;
            background: var(--secondary-color);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .book-btn:hover {
            background: #e65100;
        }
    </style>
</head>
<body>
    <header class="modern-header">
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo-section">
                    <div class="logo-icon"><i class="fas fa-train"></i></div>
                    <div class="logo-text">
                        <h1>TrainCare Connect</h1>
                        <span>Book Your Ticket</span>
                    </div>
                </a>
                <nav class="main-nav">
                    <a href="/" class="nav-link">Home</a>
                    <a href="/train_booking" class="nav-link active">Book Ticket</a>
                    <a href="/pnr_status" class="nav-link">PNR Status</a>
                    <a href="/seat_availability" class="nav-link">Seat Availability</a>
                </nav>
                <div class="header-actions">
                    <div class="language-switcher">
                        <button class="lang-btn" id="langBtn">
                            <i class="fas fa-globe"></i>
                            <span id="currentLang">{{ languages[lang].name if lang in languages else 'English' }}</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <div class="lang-dropdown" id="langDropdown">
                            {% for code, lang_info in languages.items() %}
                            <a href="/set_language/{{ code }}?redirect={{ request.path }}" class="lang-option {% if code == lang %}active{% endif %}">
                                <span class="lang-flag">{{ lang_info.flag }}</span>
                                <span class="lang-name">{{ lang_info.name }}</span>
                            </a>
                            {% endfor %}
                        </div>
                    </div>
                    <a href="/login" class="btn btn-outline">Login</a>
                </div>
            </div>
        </div>
    </header>

    <div class="booking-container">
        <div class="booking-card">
            <h2 style="margin-bottom: 30px; color: var(--text-primary);">
                <i class="fas fa-ticket-alt" style="color: var(--primary-color); margin-right: 12px;"></i>
                Book Train Ticket
            </h2>
            
            <form id="bookingForm">
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt"></i> From Station</label>
                        <input type="text" class="form-control" id="fromStation" placeholder="Enter source station" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt"></i> To Station</label>
                        <input type="text" class="form-control" id="toStation" placeholder="Enter destination station" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> Journey Date</label>
                        <input type="date" class="form-control" id="journeyDate" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-users"></i> Class</label>
                        <select class="form-control" id="class">
                            <option value="SL">Sleeper (SL)</option>
                            <option value="3A">AC 3 Tier (3A)</option>
                            <option value="2A">AC 2 Tier (2A)</option>
                            <option value="1A">AC First Class (1A)</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="search-btn">
                    <i class="fas fa-search"></i> Search Trains
                </button>
            </form>
            
            <div id="results" class="results-section" style="display: none;">
                <h3 style="margin-bottom: 20px;">Available Trains</h3>
                <div id="trainResults"></div>
            </div>
        </div>
    </div>

    <script>
        // Set minimum date to today
        document.getElementById('journeyDate').min = new Date().toISOString().split('T')[0];
        
        // Language switcher
        document.getElementById('langBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('langDropdown').classList.toggle('show');
        });
        
        document.addEventListener('click', function(e) {
            const langBtn = document.getElementById('langBtn');
            const dropdown = document.getElementById('langDropdown');
            if (!langBtn.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.remove('show');
            }
        });
        
        // Booking form submission
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fromStation = document.getElementById('fromStation').value;
            const toStation = document.getElementById('toStation').value;
            const date = document.getElementById('journeyDate').value;
            const classCode = document.getElementById('class').value;
            
            // Search trains
            fetch(`/search_trains?q=${fromStation}`)
                .then(response => response.json())
                .then(data => {
                    displayResults(data.trains, fromStation, toStation, date, classCode);
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error searching trains. Please try again.');
                });
        });
        
        function displayResults(trains, fromStation, toStation, date, classCode) {
            const resultsDiv = document.getElementById('results');
            const trainResults = document.getElementById('trainResults');
            
            if (trains.length === 0) {
                trainResults.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">No trains found. Please try different stations.</p>';
                resultsDiv.style.display = 'block';
                return;
            }
            
            trainResults.innerHTML = trains.slice(0, 5).map(train => `
                <div class="train-result">
                    <div class="train-header">
                        <div class="train-info">
                            <h3>${train.name}</h3>
                            <p><strong>Train No:</strong> ${train.number}</p>
                            <p><strong>Route:</strong> ${train.source} → ${train.destination}</p>
                        </div>
                        <button class="book-btn" onclick="bookTrain('${train.number}', '${fromStation}', '${toStation}', '${date}', '${classCode}')">
                            Book Now
                        </button>
                    </div>
                    <div class="train-timing">
                        <div class="timing-item">
                            <div class="time">08:00</div>
                            <div class="station">${fromStation}</div>
                        </div>
                        <div class="duration">
                            <i class="fas fa-clock"></i> 12h 30m
                        </div>
                        <div class="timing-item">
                            <div class="time">20:30</div>
                            <div class="station">${toStation}</div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            resultsDiv.style.display = 'block';
            resultsDiv.scrollIntoView({ behavior: 'smooth' });
        }
        
        function bookTrain(trainNumber, fromStation, toStation, date, classCode) {
            if (!confirm('Proceed to booking? (This is a demo - actual booking requires payment integration)')) {
                return;
            }
            alert(`Booking initiated for Train ${trainNumber}| tojson | safe}}nFrom: ${fromStation}| tojson | safe}}nTo: ${toStation}| tojson | safe}}nDate: ${date}| tojson | safe}}nClass: ${classCode}| tojson | safe}}n| tojson | safe}}nNote: This is a demo. In production, this would redirect to payment gateway.`);
        }
    </script>
</body>
</html>
